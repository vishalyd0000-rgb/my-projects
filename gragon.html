<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exact Ink Brush Dragon Reference</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #eae5db; /* Exact matching off-white background from your image */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            background-color: #eae5db;
            cursor: crosshair;
        }
    </style>
</head>
<body>

<canvas id="dragonCanvas"></canvas>

<script>
const canvas = document.getElementById('dragonCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- LOGIC ARRAYS ---
let history = [];
const maxLength = 100; // Poori body aur tail ki lambai

let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
let lastMouse = { x: mouse.x, y: mouse.y };

window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// Smooth math tracker
function lerp(start, end, amt) {
    return (1 - amt) * start + amt * end;
}

// --- MAIN ANIMATION CORE ---
function animate() {
    // Clear screen with image background tone
    ctx.fillStyle = '#eae5db';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Smooth physics path follow (Exact fluid movement)
    let targetX = lerp(history.length > 0 ? history[0].x : mouse.x, mouse.x, 0.12);
    let targetY = lerp(history.length > 0 ? history[0].y : mouse.y, mouse.y, 0.12);

    history.unshift({ x: targetX, y: targetY });
    if (history.length > maxLength) {
        history.pop();
    }

    // --- DRAWING FROM TAIL TO HEAD ---
    for (let i = history.length - 1; i >= 0; i--) {
        let current = history[i];
        let next = history[Math.max(i - 1, 0)];
        
        let angle = Math.atan2(next.y - current.y, next.x - current.x);
        let sizeFactor = 1 - (i / history.length); // Head bada, tail patli

        ctx.save();
        ctx.translate(current.x, current.y);
        ctx.rotate(angle);

        // Alpha values for realistic ink fade
        let alpha = sizeFactor * 0.85;
        ctx.fillStyle = `rgba(18, 18, 18, ${alpha})`;
        ctx.strokeStyle = `rgba(18, 18, 18, ${alpha})`;

        if (i === 0) {
            // =======================================================
            // 1. EXACT ARROW-STYLE DRAGON HEAD (Jaisa photo mein hai)
            // =======================================================
            ctx.fillStyle = "rgba(10, 10, 10, 1)"; // Deep dark head
            ctx.beginPath();
            ctx.moveTo(35, 0);          // Front sharp nose
            ctx.lineTo(10, -14);        // Upper snout
            ctx.lineTo(-5, -16);        // Head hump left
            ctx.lineTo(-8, -6);         // Inner cutout
            ctx.lineTo(-24, -2);        // Left back wing tip point
            ctx.lineTo(-12, 0);         // Center spine anchor
            ctx.lineTo(-24, 2);         // Right back wing tip point
            ctx.lineTo(-8, 6);          // Inner cutout right
            ctx.lineTo(-5, 16);         // Head hump right
            ctx.lineTo(10, 14);         // Lower snout
            ctx.closePath();
            ctx.fill();

        } else {
            // =======================================================
            // 2. LONG SINGLE-STROKE RIBBED WINGS (Pankh Jo Photo Mein Hain)
            // =======================================================
            // Wings sirf upper chest nodes (i = 8 se 22 ke beech) par bante hain
            if (i >= 8 && i <= 22) {
                let wingProgress = (i - 8) / 14;
                // Maximum sweeping wing extension
                let wingSpan = 180 * Math.sin(wingProgress * Math.PI); 

                ctx.lineWidth = 1.2 * sizeFactor;
                ctx.strokeStyle = `rgba(22, 22, 22, ${0.75 * sizeFactor})`;

                // 8 alag-alag sweeping brush feathers (curves) dono side nikalenge
                for (let k = 0; k < 8; k++) {
                    let fRatio = k / 7;
                    // Dynamic backward sweep curve calculation
                    let sweepBack = -35 - (k * 6);

                    // LEFT WING FEATHERS
                    ctx.beginPath();
                    ctx.moveTo(-2, -3);
                    ctx.bezierCurveTo(
                        -15, -wingSpan * 0.3 * fRatio, 
                        sweepBack * 0.6, -wingSpan * 0.8 * fRatio, 
                        sweepBack, -wingSpan * fRatio
                    );
                    ctx.stroke();

                    // RIGHT WING FEATHERS
                    ctx.beginPath();
                    ctx.moveTo(-2, 3);
                    ctx.bezierCurveTo(
                        -15, wingSpan * 0.3 * fRatio, 
                        sweepBack * 0.6, wingSpan * 0.8 * fRatio, 
                        sweepBack, wingSpan * fRatio
                    );
                    ctx.stroke();
                }
            }

            // =======================================================
            // 3. REB-CAGE SPINE VERTEBRAE (Reedh ki haddi aur kaante)
            // =======================================================
            ctx.fillStyle = `rgba(28, 28, 28, ${alpha})`;
            
            // Central body node bone
            ctx.beginPath();
            ctx.arc(0, 0, 5.5 * sizeFactor, 0, Math.PI * 2);
            ctx.fill();

            // Sharp dynamic back spikes (Triangular scales from your image)
            let spikeLen = 14 * sizeFactor;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-8, -spikeLen); // Left side lateral bone spike
            ctx.lineTo(-4, 0);
            ctx.lineTo(-8, spikeLen);  // Right side lateral bone spike
            ctx.closePath();
            ctx.fill();

            // Tail gradual fading dots mechanism
            if (i > maxLength * 0.75) {
                ctx.fillStyle = `rgba(40, 40, 40, ${alpha * 0.4})`;
                ctx.beginPath();
                ctx.arc(-12, 0, 2 * sizeFactor, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.restore();
    }

    requestAnimationFrame(animate);
}

// Ignition
animate();
</script>

</body>
</html>
